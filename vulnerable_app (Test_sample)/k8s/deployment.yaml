apiVersion: apps/v1
kind: Deployment
metadata:
  name: securevault
spec:
  replicas: 1
  selector:
    matchLabels:
      app: securevault
  template:
    metadata:
      labels:
        app: securevault
    spec:
      containers:
      - name: securevault
        image: securevault:latest
        # SECURITY ISSUE: Running as root
        securityContext:
          runAsUser: 0
          privileged: true
        env:
        # SECURITY ISSUE: Hardcoded secrets
        - name: SECRET_KEY
          value: "dev_secret_key_12345_change_in_production"
        - name: JWT_SECRET
          value: "jwt_super_secret_do_not_share"
        - name: AWS_ACCESS_KEY_ID
          value: "AKIAIOSFODNN7EXAMPLE"
        - name: AWS_SECRET_ACCESS_KEY
          value: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: securevault
spec:
  selector:
    app: securevault
  ports:
  - port: 80
    targetPort: 5000
  # SECURITY ISSUE: LoadBalancer exposes service publicly
  type: LoadBalancer
